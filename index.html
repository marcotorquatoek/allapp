<!-- ============================================================
     WEB APP HUB — index.html
     VERSIONE INTERNA: 1.8.2
     - Sigla app generata dalle iniziali del nome (no piu NEW)
     - Card semplificate: solo nome + bottoni (App / GitHub)
     - Link reali delle app inseriti
     - EK DOCS / Doculingua con sito reale + beta EK DOCS
     - Link Supabase SQL per i due progetti
     - Due colonne anche su mobile
     - Fix logo header (SVG inline, sempre visibile)
     - Tema chiaro (default) / scuro
     ============================================================ -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Hub · Marco</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#f5f6f9; --panel:#ffffff; --panel-2:#eef0f5; --line:#dde1ea;
    --txt:#1a1d26; --txt-dim:#6b7283; --acc:#ff5c33; --acc-2:#1aa179;
    --warn:#c98a00; --radius:14px; --shadow:0 2px 10px rgba(20,25,40,.06);
  }
  [data-theme="dark"]{
    --bg:#13161c; --panel:#1b1f29; --panel-2:#222735; --line:#2e3445;
    --txt:#e7e9ee; --txt-dim:#9aa1b2; --acc:#ff7a4d; --acc-2:#4dd0a7;
    --warn:#ffcf5c; --shadow:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,92,51,.08), transparent 60%),
      radial-gradient(700px 400px at -5% 110%, rgba(26,161,121,.06), transparent 60%),
      var(--bg);
    color:var(--txt); min-height:100vh; padding:32px 16px; transition:background .25s,color .25s;
  }
  .wrap{max-width:980px;margin:0 auto}
  header{margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{width:54px;height:54px;border-radius:14px;flex:0 0 auto;box-shadow:var(--shadow)}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);font-weight:700}
  h1{font-size:28px;font-weight:800;margin-top:2px;letter-spacing:-.02em}
  .ver-badge{display:inline-block;margin-top:4px;font-size:11px;font-weight:700;
    letter-spacing:.05em;color:var(--txt-dim);background:var(--panel-2);
    border:1px solid var(--line);border-radius:20px;padding:2px 9px}
  .head-actions{display:flex;gap:8px;flex-wrap:wrap}
  .ghost{
    background:var(--panel);color:var(--txt);border:1px solid var(--line);
    padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);
  }
  .ghost:hover{border-color:var(--acc)}
  .ghost.active{background:var(--acc);color:#fff;border-color:var(--acc)}

  /* link Supabase */
  .supabar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 20px}
  .supa-link{display:flex;align-items:center;gap:8px;text-decoration:none;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:9px 14px;font-size:13px;font-weight:600;color:var(--txt);box-shadow:var(--shadow)}
  .supa-link:hover{border-color:var(--acc-2)}
  .supa-dot{width:9px;height:9px;border-radius:50%;background:var(--acc-2)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;display:flex;flex-direction:column;gap:14px;position:relative;box-shadow:var(--shadow);
    transition:transform .15s ease,border-color .15s ease;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--acc)}
  .card.test{border-style:dashed;border-color:var(--warn)}
  .card.self{border-color:var(--acc-2)}

  .top{display:flex;align-items:center;gap:11px}
  .icon{width:42px;height:42px;border-radius:11px;flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
  .name{font-size:16px;font-weight:700;line-height:1.15}

  .actions{display:flex;gap:8px;margin-top:auto}
  .btn{flex:1;text-align:center;text-decoration:none;padding:9px 6px;border-radius:9px;
    font-size:12.5px;font-weight:600;transition:opacity .15s ease;cursor:pointer;border:none}
  .btn:hover{opacity:.85}
  .btn-open{background:var(--acc);color:#fff}
  .btn-git{background:var(--panel-2);color:var(--txt);border:1px solid var(--line)}
  .btn-beta{background:transparent;color:var(--warn);border:1px solid var(--warn)}
  .btn-folder{background:transparent;color:var(--txt-dim);border:1px solid var(--line)}
  .btn-folder:hover{color:var(--acc);border-color:var(--acc)}
  .btn-del{background:transparent;color:#e03131;border:1px solid #e03131;flex:0 0 auto;padding:9px 12px}
  .btn[aria-disabled="true"]{opacity:.45;pointer-events:none}

  .edit-btn{position:absolute;top:10px;right:10px;background:var(--panel-2);
    border:1px solid var(--line);color:var(--txt-dim);width:28px;height:28px;
    border-radius:8px;cursor:pointer;font-size:13px;display:none}
  .editing .edit-btn{display:block}
  .edit-btn:hover{color:var(--acc);border-color:var(--acc)}

  .form{display:flex;flex-direction:column;gap:8px}
  .form label{font-size:11px;color:var(--txt-dim);letter-spacing:.04em}
  .form input,.form select{width:100%;padding:8px 10px;background:var(--bg);
    border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:13px}
  .form input:focus,.form select:focus{outline:none;border-color:var(--acc)}
  .form-row{display:flex;gap:8px}
  .form-row>div{flex:1}
  .save-row{display:flex;gap:8px;margin-top:4px}

  footer{margin-top:26px;color:var(--txt-dim);font-size:12px;text-align:center}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--acc-2);color:#fff;padding:10px 18px;border-radius:10px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}

  /* MOBILE: due colonne mantenute, testo/padding ridotti */
  @media(max-width:560px){
    body{padding:20px 10px}
    h1{font-size:22px}
    .grid{gap:10px}
    .card{padding:12px;gap:11px}
    .icon{width:36px;height:36px;font-size:13px}
    .name{font-size:14px}
    .btn{font-size:11px;padding:8px 4px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <!-- logo SVG inline: sempre visibile, nessun file esterno richiesto -->
      <svg class="logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-label="App Hub">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ff7a4d"/><stop offset="1" stop-color="#ff4d8d"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="112" fill="url(#bg)"/>
        <g fill="#fff">
          <rect x="120" y="120" width="120" height="120" rx="26"/>
          <rect x="272" y="120" width="120" height="120" rx="26"/>
          <rect x="120" y="272" width="120" height="120" rx="26"/>
          <rect x="272" y="272" width="120" height="120" rx="26"/>
        </g>
        <g stroke="#13161c" stroke-width="14" stroke-linecap="round">
          <line x1="256" y1="256" x2="180" y2="180"/><line x1="256" y1="256" x2="332" y2="180"/>
          <line x1="256" y1="256" x2="180" y2="332"/><line x1="256" y1="256" x2="332" y2="332"/>
        </g>
        <circle cx="256" cy="256" r="34" fill="#13161c"/>
      </svg>
      <div>
        <div class="eyebrow">Web App Hub</div>
        <h1>Le mie app</h1>
        <span id="verBadge" class="ver-badge"></span>
      </div>
    </div>
    <div class="head-actions">
      <a class="ghost" href="https://github.com/marcotorquatoek/allapp/upload/main" target="_blank" rel="noopener" title="Push nuova versione dell'hub">⤴ GitHub Hub</a>
      <button class="ghost" id="themeToggle">🌙 Scuro</button>
      <button class="ghost" id="editToggle">✎ Modifica</button>
      <button class="ghost" id="addBtn" style="display:none">＋ Nuova app</button>
      <button class="ghost" id="resetBtn" style="display:none">↺ Ripristina</button>
    </div>
  </header>

  <div class="supabar">
    <a class="supa-link" href="https://supabase.com/dashboard/project/mddqusydtejvapwaftzf/sql/new" target="_blank" rel="noopener"><span class="supa-dot"></span>SQL · edilkamin-portale</a>
    <a class="supa-link" href="https://supabase.com/dashboard/project/zdwzombpaixkcryfpkxg/sql/new?skip=true" target="_blank" rel="noopener"><span class="supa-dot"></span>SQL · marcoapps</a>
  </div>

  <div class="grid" id="grid"></div>
  <footer id="foot">Hub v1.3.0</footer>
</div>
<div class="toast" id="toast"></div>

<script>
const VERSION="1.8.2";

const defaultApps=[
  {name:"EK DOCS",icon:"EK",color:"#5b8def",stato:"ok",kind:"web",url:"https://ekdocs.edilkamin.com",beta:"https://ekdocs.edilkamin.com/index-test.html",folder:"\\\\LAI-SRV-009-BIS\\ekdocs",git:""},
  {name:"Doculingua",icon:"DL",color:"#9b7bff",stato:"ok",kind:"web",url:"https://ekdocs.edilkamin.com/doculingua.html",beta:"",folder:"\\\\LAI-SRV-009-BIS\\ekdocs",git:""},
  {name:"ConcertiLive",icon:"CL",color:"#ff6b6b",stato:"",kind:"web",url:"https://marcotorquatoek.github.io/concertilive",beta:"",git:"https://github.com/marcotorquatoek/concertilive/upload/main"},
  {name:"Budget/Debiti",icon:"BD",color:"#4dd0a7",stato:"",kind:"web",url:"https://marcotorquatoek.github.io/debiti",beta:"",git:"https://github.com/marcotorquatoek/debiti/upload/main"},
  {name:"LyricStudio",icon:"LS",color:"#ffa94d",stato:"",kind:"web",url:"https://marcotorquatoek.github.io/lyricstudio",beta:"",git:"https://github.com/marcotorquatoek/lyricstudio/upload/main"},
  {name:"AI Vault",icon:"AI",color:"#22b8cf",stato:"",kind:"web",url:"https://marcotorquatoek.github.io/aivault",beta:"",git:"https://github.com/marcotorquatoek/aivault/upload/main"},
  {name:"ToDoApp",icon:"TD",color:"#f783ac",stato:"",kind:"web",url:"https://marcotorquatoek.github.io/todolist",beta:"",git:"https://github.com/marcotorquatoek/todolist/upload/main"},
  {name:"FlexiFly",icon:"FF",color:"#74c0fc",stato:"",kind:"web",url:"https://marcotorquatoek.github.io/flexifly",beta:"",git:"https://github.com/marcotorquatoek/flexifly/upload/main"}
];

let apps=[], editing=false, editIndex=-1, theme="light";
const grid=document.getElementById('grid'), foot=document.getElementById('foot'), toastEl=document.getElementById('toast');

async function load(){
  try{ const r=await window.storage.get('hub:apps'); apps=r&&r.value?JSON.parse(r.value):structuredClone(defaultApps); }
  catch(e){ apps=structuredClone(defaultApps); }
  // migrazione: rimuove vecchie card self/test e aggiunge cartella di rete a EK DOCS/Doculingua
  const before=JSON.stringify(apps);
  apps=apps.filter(a=>a.kind!=='self' && a.stato!=='test');
  apps.forEach(a=>{
    if((a.name==='EK DOCS'||a.name==='Doculingua') && !a.folder) a.folder="\\\\LAI-SRV-009-BIS\\ekdocs";
    if(!a.icon || a.icon==='NEW') a.icon=initialsFrom(a.name);
  });
  if(JSON.stringify(apps)!==before) await save();
  try{ const t=await window.storage.get('hub:theme'); if(t&&t.value) theme=t.value; }catch(e){}
  applyTheme();
  document.getElementById('verBadge').textContent='v'+VERSION;
  render();
}
async function save(){ try{ await window.storage.set('hub:apps',JSON.stringify(apps)); }catch(e){} }
async function saveTheme(){ try{ await window.storage.set('hub:theme',theme); }catch(e){} }
function applyTheme(){
  document.documentElement.setAttribute('data-theme',theme==='dark'?'dark':'light');
  document.getElementById('themeToggle').textContent=theme==='dark'?'☀ Chiaro':'🌙 Scuro';
}
function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'),1600); }

function cardView(a,i){
  const openBtn = a.url
    ? `<a class="btn btn-open" href="${a.url}" target="_blank" rel="noopener">App ↗</a>`
    : `<a class="btn btn-open" aria-disabled="true">no app</a>`;
  const gitBtn = a.git
    ? `<a class="btn btn-git" href="${a.git}" target="_blank" rel="noopener">GitHub ↗</a>`
    : "";
  const betaBtn = a.beta
    ? `<a class="btn btn-beta" href="${a.beta}" target="_blank" rel="noopener">Beta ↗</a>` : "";
  const folderBtn = a.folder
    ? `<a class="btn btn-folder" href="file:///${a.folder.replace(/\\/g,'/')}" title="${a.folder}">📁 Cartella</a>` : "";
  const secondRow = (betaBtn||folderBtn) ? `<div class="actions">${betaBtn}${folderBtn}</div>` : "";
  return `
    <button class="edit-btn" onclick="openEditor(${i})">✎</button>
    <div class="top">
      <div class="icon" style="background:linear-gradient(135deg,${a.color},#2a2f3e)">${a.icon}</div>
      <div class="name">${a.name}</div>
    </div>
    <div class="actions">${openBtn}${gitBtn}</div>
    ${secondRow}`;
}

function cardEdit(a,i){
  return `
    <div class="form">
      <div class="form-row">
        <div><label>Nome</label><input id="f-name-${i}" value="${a.name||''}"></div>
        <div><label>Sigla (auto)</label><input id="f-icon-${i}" value="${a.icon||''}" maxlength="3" placeholder="da nome"></div>
      </div>
      <div class="form-row">
        <div><label>Colore</label><input id="f-color-${i}" type="color" value="${a.color||'#5b8def'}"></div>
        <div><label>Stato</label>
          <select id="f-stato-${i}">
            <option value="" ${a.stato===''?'selected':''}>—</option>
            <option value="test" ${a.stato==='test'?'selected':''}>Test</option>
          </select></div>
      </div>
      <label>URL app</label><input id="f-url-${i}" value="${(a.url||'').replace(/"/g,'&quot;')}" placeholder="https://...">
      <label>URL beta (opzionale)</label><input id="f-beta-${i}" value="${(a.beta||'').replace(/"/g,'&quot;')}" placeholder="https://...">
      <label>Cartella di rete (opzionale)</label><input id="f-folder-${i}" value="${(a.folder||'').replace(/"/g,'&quot;')}" placeholder="\\\\SERVER\\cartella">
      <label>Repo GitHub</label><input id="f-git-${i}" value="${a.git||''}" placeholder="https://github.com/...">
      <div class="save-row">
        <button class="btn btn-open" onclick="saveCard(${i})">Salva</button>
        <button class="btn btn-git" onclick="cancelEdit()">Annulla</button>
        <button class="btn btn-del" onclick="deleteCard(${i})">Elimina</button>
      </div>
    </div>`;
}

function render(){
  grid.innerHTML='';
  apps.forEach((a,i)=>{
    const c=document.createElement('div');
    c.className="card"+(a.stato==="test"?" test":"")+(a.kind==="self"?" self":"");
    c.innerHTML=(editing&&editIndex===i)?cardEdit(a,i):cardView(a,i);
    grid.appendChild(c);
  });
  document.body.classList.toggle('editing',editing);
  foot.textContent=`Hub v${VERSION} · ${apps.length} app`;
}

window.openEditor=(i)=>{ editIndex=i; render(); };
window.cancelEdit=()=>{ editIndex=-1; render(); };
window.deleteCard=async(i)=>{
  if(!confirm('Eliminare "'+(apps[i].name||'questa app')+'"?')) return;
  apps.splice(i,1); editIndex=-1; await save(); render(); toast('App eliminata');
};
window.addCard=async()=>{
  apps.push({name:"Nuova app",icon:"",color:"#5b8def",stato:"",kind:"web",url:"",beta:"",folder:"",git:""});
  editIndex=apps.length-1; await save(); render();
  document.querySelectorAll('.card')[editIndex].scrollIntoView({behavior:'smooth',block:'center'});
};
function initialsFrom(name){
  const words=(name||'').replace(/[^\p{L}\p{N} ]/gu,' ').trim().split(/\s+/).filter(Boolean);
  if(!words.length) return "APP";
  if(words.length===1) return words[0].slice(0,2).toUpperCase();
  return (words[0][0]+words[1][0]).toUpperCase();
}
window.saveCard=async(i)=>{
  const g=id=>document.getElementById(id+'-'+i).value;
  const prev=apps[i];
  let icon=g('f-icon').trim();
  if(!icon) icon=initialsFrom(g('f-name'));
  apps[i]={name:g('f-name'),icon:icon,color:g('f-color'),stato:g('f-stato'),
    kind:prev.kind||'web',url:g('f-url'),beta:g('f-beta'),folder:g('f-folder'),git:g('f-git')};
  editIndex=-1; await save(); render(); toast('Scheda salvata');
};

document.getElementById('editToggle').addEventListener('click',(e)=>{
  editing=!editing; editIndex=-1;
  e.target.classList.toggle('active',editing);
  e.target.textContent=editing?'✓ Fine':'✎ Modifica';
  document.getElementById('addBtn').style.display=editing?'inline-block':'none';
  document.getElementById('resetBtn').style.display=editing?'inline-block':'none';
  render();
});
document.getElementById('addBtn').addEventListener('click',()=>window.addCard());
document.getElementById('resetBtn').addEventListener('click',async()=>{
  if(!confirm('Ripristinare la lista di app predefinita? Le modifiche salvate andranno perse.')) return;
  apps=structuredClone(defaultApps); editIndex=-1; await save(); render(); toast('Lista ripristinata');
});
document.getElementById('themeToggle').addEventListener('click',()=>{
  theme=theme==='dark'?'light':'dark'; applyTheme(); saveTheme();
});

load();
</script>
</body>
</html>
