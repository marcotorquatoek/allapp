<!-- ============================================================
     WEB APP HUB — index.html
     VERSIONE INTERNA: 1.2.0
     - Icona app (hub-icon.svg) integrata nell'header
     - Card dell'hub stesso con repo GitHub allapp
     - Tema chiaro (default) / scuro con toggle
     - EK DOCS e Doculingua: cartella server, NESSUN GitHub
     - Layout a due colonne + editor schede con persistenza
     ============================================================ -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Hub · Marco</title>
<style>
  :root{
    /* TEMA CHIARO (default) */
    --bg:#f5f6f9; --panel:#ffffff; --panel-2:#eef0f5; --line:#dde1ea;
    --txt:#1a1d26; --txt-dim:#6b7283; --acc:#ff5c33; --acc-2:#1aa179;
    --warn:#c98a00; --radius:14px; --shadow:0 2px 10px rgba(20,25,40,.06);
  }
  [data-theme="dark"]{
    --bg:#13161c; --panel:#1b1f29; --panel-2:#222735; --line:#2e3445;
    --txt:#e7e9ee; --txt-dim:#9aa1b2; --acc:#ff7a4d; --acc-2:#4dd0a7;
    --warn:#ffcf5c; --shadow:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,92,51,.08), transparent 60%),
      radial-gradient(700px 400px at -5% 110%, rgba(26,161,121,.06), transparent 60%),
      var(--bg);
    color:var(--txt); min-height:100vh; padding:40px 20px; transition:background .25s,color .25s;
  }
  .wrap{max-width:980px;margin:0 auto}
  header{margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .brand img{width:54px;height:54px;border-radius:14px;box-shadow:var(--shadow)}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);font-weight:700}
  h1{font-size:30px;font-weight:800;margin-top:4px;letter-spacing:-.02em}
  .sub{color:var(--txt-dim);margin-top:4px;font-size:14px}
  .head-actions{display:flex;gap:8px}
  .ghost{
    background:var(--panel);color:var(--txt);border:1px solid var(--line);
    padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);
  }
  .ghost:hover{border-color:var(--acc)}
  .ghost.active{background:var(--acc);color:#fff;border-color:var(--acc)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:8px}
  @media(max-width:720px){.grid{grid-template-columns:1fr}}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;display:flex;flex-direction:column;gap:14px;position:relative;box-shadow:var(--shadow);
    transition:transform .15s ease,border-color .15s ease;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--acc)}
  .card.test{border-style:dashed;border-color:var(--warn)}
  .card.self{border-color:var(--acc-2)}

  .top{display:flex;align-items:center;gap:12px}
  .icon{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff}
  .name{font-size:17px;font-weight:700}
  .chat{font-size:12px;color:var(--txt-dim)}

  .meta{display:flex;flex-wrap:wrap;gap:6px;min-height:4px}
  .tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--panel-2);
    color:var(--txt-dim);border:1px solid var(--line)}
  .tag.ok{color:var(--acc-2);border-color:rgba(26,161,121,.35)}
  .tag.chk{color:var(--warn);border-color:rgba(201,138,0,.35)}
  .tag.srv{color:var(--acc);border-color:rgba(255,92,51,.35)}

  .actions{display:flex;gap:8px;margin-top:auto}
  .btn{flex:1;text-align:center;text-decoration:none;padding:10px;border-radius:10px;
    font-size:13px;font-weight:600;transition:opacity .15s ease;cursor:pointer;border:none}
  .btn:hover{opacity:.85}
  .btn-open{background:var(--acc);color:#fff}
  .btn-git{background:var(--panel-2);color:var(--txt);border:1px solid var(--line)}
  .btn[aria-disabled="true"]{opacity:.45;pointer-events:none}

  .edit-btn{position:absolute;top:12px;right:12px;background:var(--panel-2);
    border:1px solid var(--line);color:var(--txt-dim);width:30px;height:30px;
    border-radius:8px;cursor:pointer;font-size:14px;display:none}
  .editing .edit-btn{display:block}
  .edit-btn:hover{color:var(--acc);border-color:var(--acc)}

  .form{display:flex;flex-direction:column;gap:8px}
  .form label{font-size:11px;color:var(--txt-dim);letter-spacing:.04em}
  .form input,.form select{width:100%;padding:8px 10px;background:var(--bg);
    border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:13px}
  .form input:focus,.form select:focus{outline:none;border-color:var(--acc)}
  .form-row{display:flex;gap:8px}
  .form-row>div{flex:1}
  .save-row{display:flex;gap:8px;margin-top:4px}

  footer{margin-top:30px;color:var(--txt-dim);font-size:12px;text-align:center}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--acc-2);color:#fff;padding:10px 18px;border-radius:10px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="hub-icon.svg" alt="App Hub" id="brandIcon">
      <div>
        <div class="eyebrow">Web App Hub</div>
        <h1>Le mie app</h1>
        <p class="sub">Apri il sito o vai al repo GitHub per pushare la nuova versione.</p>
      </div>
    </div>
    <div class="head-actions">
      <button class="ghost" id="themeToggle">🌙 Scuro</button>
      <button class="ghost" id="editToggle">✎ Modifica</button>
    </div>
  </header>

  <div class="grid" id="grid"></div>
  <footer id="foot">Hub v1.2.0</footer>
</div>
<div class="toast" id="toast"></div>

<script>
const VERSION = "1.2.0";

// kind: "web" = app con sito+github | "server" = cartella condivisa (no github) | "self" = questo hub
const defaultApps = [
  {name:"App Hub",chat:"questo hub",icon:"HUB",color:"#ff5c33",supa:"",proj:"",stato:"",kind:"self",url:"",git:"https://github.com/marcotorquatoek/allapp/upload/main"},
  {name:"EK DOCS",chat:"Ek Docs 5",icon:"EK",color:"#5b8def",supa:"Supa1",proj:"edilkamin-portale",stato:"ok",kind:"server",url:"\\\\LAI-SRV-009-BIS\\ekdocs",git:""},
  {name:"Doculingua",chat:"Doculingua 2",icon:"DL",color:"#9b7bff",supa:"Supa1",proj:"edilkamin-portale",stato:"ok",kind:"server",url:"\\\\LAI-SRV-009-BIS\\ekdocs",git:""},
  {name:"ConcertiLive",chat:"Statistiche",icon:"CL",color:"#ff6b6b",supa:"Supa1",proj:"marcoapps",stato:"chk",kind:"web",url:"",git:"https://github.com/marcotorquatoek/concertilive/upload/main"},
  {name:"Budget/Debiti",chat:"APP Budget",icon:"BD",color:"#4dd0a7",supa:"Supa1",proj:"marcoapps",stato:"ok",kind:"web",url:"",git:"https://github.com/marcotorquatoek/debiti/upload/main"},
  {name:"LyricStudio",chat:"LyStudio",icon:"LS",color:"#ffa94d",supa:"Supa1",proj:"marcoapps",stato:"ok",kind:"web",url:"",git:"https://github.com/marcotorquatoek/lyricstudio/upload/main"},
  {name:"AI Vault",chat:"AI Vault",icon:"AI",color:"#22b8cf",supa:"",proj:"",stato:"chk",kind:"web",url:"",git:"https://github.com/marcotorquatoek/aivault/upload/main"},
  {name:"ToDoApp",chat:"ToDoApp",icon:"TD",color:"#f783ac",supa:"Supa1",proj:"Tiene in vita entrambi",stato:"ok",kind:"web",url:"",git:"https://github.com/marcotorquatoek/todolist/upload/main"},
  {name:"FlexiFly",chat:"Flexi APP",icon:"FF",color:"#74c0fc",supa:"",proj:"",stato:"",kind:"web",url:"",git:"https://github.com/marcotorquatoek/flexifly/upload/main"},
  {name:"Test build",chat:"versione di test",icon:"βT",color:"#868e96",supa:"",proj:"",stato:"test",kind:"web",url:"",git:""}
];

const statoLabel = {ok:["App aggiornata","ok"], chk:["Verificare se online","chk"]};
let apps=[], editing=false, editIndex=-1, theme="light";

const grid=document.getElementById('grid');
const foot=document.getElementById('foot');
const toastEl=document.getElementById('toast');

async function load(){
  try{
    const r=await window.storage.get('hub:apps');
    apps = r&&r.value ? JSON.parse(r.value) : structuredClone(defaultApps);
  }catch(e){ apps=structuredClone(defaultApps); }
  try{
    const t=await window.storage.get('hub:theme');
    if(t&&t.value) theme=t.value;
  }catch(e){}
  applyTheme();
  render();
}
async function save(){ try{ await window.storage.set('hub:apps',JSON.stringify(apps)); }catch(e){} }
async function saveTheme(){ try{ await window.storage.set('hub:theme',theme); }catch(e){} }

function applyTheme(){
  document.documentElement.setAttribute('data-theme', theme==='dark'?'dark':'light');
  const b=document.getElementById('themeToggle');
  b.textContent = theme==='dark' ? '☀ Chiaro' : '🌙 Scuro';
}

function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'),1600); }

function cardView(a,i){
  const tags=[];
  if(a.supa) tags.push(`<span class="tag">${a.supa}</span>`);
  if(a.proj) tags.push(`<span class="tag">${a.proj}</span>`);
  if(a.kind==="server") tags.push(`<span class="tag srv">Cartella server</span>`);
  if(a.kind==="self") tags.push(`<span class="tag ok">Questo hub</span>`);
  if(statoLabel[a.stato]) tags.push(`<span class="tag ${statoLabel[a.stato][1]}">${statoLabel[a.stato][0]}</span>`);
  if(a.stato==="test") tags.push(`<span class="tag chk">test</span>`);

  // bottone "apri": per cartella server è il percorso UNC, per web l'url
  let openBtn;
  if(a.kind==="server"){
    openBtn = a.url
      ? `<a class="btn btn-open" href="file:///${a.url.replace(/\\\\/g,'/').replace(/\\/g,'/')}" title="${a.url}">Apri cartella</a>`
      : `<a class="btn btn-open" aria-disabled="true">cartella mancante</a>`;
  } else {
    openBtn = a.url
      ? `<a class="btn btn-open" href="${a.url}" target="_blank" rel="noopener">Apri sito</a>`
      : `<a class="btn btn-open" aria-disabled="true">URL mancante</a>`;
  }
  // github: solo se presente (server = mai)
  const gitBtn = a.git
    ? `<a class="btn btn-git" href="${a.git}" target="_blank" rel="noopener">GitHub ↗</a>`
    : `<a class="btn btn-git" aria-disabled="true">no repo</a>`;

  return `
    <button class="edit-btn" onclick="openEditor(${i})">✎</button>
    <div class="top">
      <div class="icon" style="background:linear-gradient(135deg,${a.color},#2a2f3e)">${a.icon}</div>
      <div><div class="name">${a.name}</div><div class="chat">Chat: ${a.chat}</div></div>
    </div>
    <div class="meta">${tags.join("")}</div>
    <div class="actions">${openBtn}${gitBtn}</div>`;
}

function cardEdit(a,i){
  return `
    <div class="form">
      <div class="form-row">
        <div><label>Nome</label><input id="f-name-${i}" value="${a.name||''}"></div>
        <div><label>Sigla icona</label><input id="f-icon-${i}" value="${a.icon||''}" maxlength="3"></div>
      </div>
      <div class="form-row">
        <div><label>Chat origine</label><input id="f-chat-${i}" value="${a.chat||''}"></div>
        <div><label>Colore</label><input id="f-color-${i}" type="color" value="${a.color||'#5b8def'}"></div>
      </div>
      <label>Tipo</label>
      <select id="f-kind-${i}">
        <option value="web" ${a.kind==='web'?'selected':''}>Web app (sito + GitHub)</option>
        <option value="server" ${a.kind==='server'?'selected':''}>Cartella server (no GitHub)</option>
        <option value="self" ${a.kind==='self'?'selected':''}>Questo hub</option>
      </select>
      <label>URL sito / Percorso cartella</label><input id="f-url-${i}" value="${(a.url||'').replace(/"/g,'&quot;')}" placeholder="https://...  oppure  \\\\SERVER\\cartella">
      <label>Repo GitHub</label><input id="f-git-${i}" value="${a.git||''}" placeholder="https://github.com/...">
      <div class="form-row">
        <div><label>Supabase</label><input id="f-supa-${i}" value="${a.supa||''}"></div>
        <div><label>Progetto</label><input id="f-proj-${i}" value="${a.proj||''}"></div>
      </div>
      <label>Stato</label>
      <select id="f-stato-${i}">
        <option value="" ${a.stato===''?'selected':''}>—</option>
        <option value="ok" ${a.stato==='ok'?'selected':''}>App aggiornata</option>
        <option value="chk" ${a.stato==='chk'?'selected':''}>Verificare se online</option>
        <option value="test" ${a.stato==='test'?'selected':''}>Test</option>
      </select>
      <div class="save-row">
        <button class="btn btn-open" onclick="saveCard(${i})">Salva</button>
        <button class="btn btn-git" onclick="cancelEdit()">Annulla</button>
      </div>
    </div>`;
}

function render(){
  grid.innerHTML='';
  apps.forEach((a,i)=>{
    const c=document.createElement('div');
    c.className="card"+(a.stato==="test"?" test":"")+(a.kind==="self"?" self":"");
    c.innerHTML=(editing&&editIndex===i)?cardEdit(a,i):cardView(a,i);
    grid.appendChild(c);
  });
  document.body.classList.toggle('editing',editing);
  const testN=apps.filter(a=>a.stato==='test').length;
  foot.textContent=`Hub v${VERSION} · ${apps.length-testN} schede + ${testN} in test`;
}

window.openEditor=(i)=>{ editIndex=i; render(); };
window.cancelEdit=()=>{ editIndex=-1; render(); };
window.saveCard=async(i)=>{
  const g=id=>document.getElementById(id+'-'+i).value;
  apps[i]={
    name:g('f-name'),icon:g('f-icon'),chat:g('f-chat'),color:g('f-color'),kind:g('f-kind'),
    url:g('f-url'),git:g('f-git'),supa:g('f-supa'),proj:g('f-proj'),stato:g('f-stato')
  };
  editIndex=-1; await save(); render(); toast('Scheda salvata');
};

document.getElementById('editToggle').addEventListener('click',(e)=>{
  editing=!editing; editIndex=-1;
  e.target.classList.toggle('active',editing);
  e.target.textContent=editing?'✓ Fine':'✎ Modifica';
  render();
});
document.getElementById('themeToggle').addEventListener('click',()=>{
  theme = theme==='dark' ? 'light' : 'dark';
  applyTheme(); saveTheme();
});

load();
</script>
</body>
</html>
